name: Daily News Agents

on:
  schedule:
    # 04:00 UTC = 07:00 Riyadh time, every day
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run AI news agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node ai-news-agent.mjs

      - name: Run Saudi stocks agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node saudi-stocks-agent.mjs

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: news-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30
